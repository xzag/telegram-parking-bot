name: build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build linux amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o parking-bot \
            ./cmd/bot

      - name: Package
        run: |
          tar -czf parking-bot-linux-amd64.tar.gz parking-bot README.MD scripts/deploy.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parking-bot-linux-amd64
          path: parking-bot-linux-amd64.tar.gz
          retention-days: 14